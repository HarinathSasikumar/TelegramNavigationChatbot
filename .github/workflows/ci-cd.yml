name: CI/CD Pipeline — WhatsApp Navigation Chatbot

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ══════════════════════════════════════════════
  # JOB 1: Build & Run Unit Tests
  # ══════════════════════════════════════════════
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set Up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven (skip tests)
        run: mvn clean package -DskipTests

      - name: 🧪 Run Unit Tests
        run: mvn test

      - name: 📊 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: 📦 Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-jar
          path: target/*.jar
          retention-days: 7

  # ══════════════════════════════════════════════
  # JOB 2: Deploy to Render (only on main/master)
  # ══════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 🚀 Trigger Render Deploy Hook
        run: |
          echo "Triggering Render deployment..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o response.txt \
            -w "\nHTTP Status: %{http_code}\n"
          cat response.txt

      - name: ✅ Deployment Triggered
        run: echo "✅ Render deployment triggered. Visit https://dashboard.render.com to monitor."
