server.port=${PORT:8085}
spring.application.name=whatsapp-navigation-chatbot
spring.main.allow-bean-definition-overriding=true

# Meta WhatsApp Business API
meta.whatsapp.phone-number-id=${META_PHONE_NUMBER_ID:placeholder-phone-id}
meta.whatsapp.access-token=${META_ACCESS_TOKEN:placeholder-access-token}
meta.whatsapp.verify-token=${META_VERIFY_TOKEN:placeholder-verify-token}
meta.whatsapp.api-version=v19.0
meta.whatsapp.base-url=https://graph.facebook.com

# Firebase
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
firebase.project-id=${FIREBASE_PROJECT_ID:whatsappchatbot-e7fc3}

# Actuator (served at /actuator/health)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.navigation.chatbot=INFO
logging.level.org.springframework.web=WARN
logging.level.root=WARN

# Instagram Configuration
meta.instagram.page-access-token=${META_INSTAGRAM_PAGE_ACCESS_TOKEN:}
meta.instagram.api-version=${META_INSTAGRAM_API_VERSION:v19.0}

# Telegram Configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
